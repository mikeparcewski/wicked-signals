# Deploy the wicked-signals marketing site (site/) to GitHub Pages.
#
# DORMANT BY DESIGN: this workflow only runs on manual dispatch. Go-live is
# human-gated — it must NOT auto-run on push or merge. To publish, an operator
# triggers it from the Actions tab (and enables Pages for the repo first).
name: Deploy site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        # Served from the custom domain wsig.wickedagile.com (site/public/CNAME),
        # so site=https://wsig.wickedagile.com and base=/ (set in astro.config.mjs).
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
